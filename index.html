<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game UI Site</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="hud">
        <h1>VOID.exe</h1>
        <div class="xp-bar">
            <div class="xp-fill" id="xp"></div>
        </div>
    </div>

    <section class="menu">
        <div class="menu-item" onclick="levelUp()">START</div>
        <div class="menu-item">INVENTORY</div>
        <div class="menu-item">MISSIONS</div>
        <div class="menu-item">EXIT</div>
    </section>

    <section class="cards">
        <div class="card" onclick="activateCard(this)">
            <h3>Skill 1</h3>
            <p>Click to unlock</p>
        </div>

        <div class="card" onclick="activateCard(this)">
            <h3>Skill 2</h3>
            <p>Click to unlock</p>
        </div>

        <div class="card" onclick="activateCard(this)">
            <h3>Skill 3</h3>
            <p>Click to unlock</p>
        </div>
    </section>

    <script>
        let xp = 0;

        function levelUp() {
            xp += 20;
            if (xp > 100) xp = 0;
            document.getElementById("xp").style.width = xp + "%";
        }

        function activateCard(card) {
            card.classList.toggle("active");
        }
    </script>

</body>
</html>
